app:
    name: todo-app
    version: "1.0"
    port:
        frontend: 5173
        backend: 8090
        ai: 8091
pages:
    - name: Home
      route: /
services:
    - name: Task
      methods:
        - GET
        - POST
        - DELETE
      schema:
        done: bool
        title: string | required
